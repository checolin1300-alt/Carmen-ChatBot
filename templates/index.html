<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmensita AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Top right settings button -->
    <button id="settingsBtn" class="settings-btn" title="Configurar Carmensita">
        ⚙️
    </button>

    <!-- Slide-in configuration panel -->
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-header">
            <h2>Configuración</h2>
            <button id="closeSettingsBtn" class="close-btn">&times;</button>
        </div>
        <div class="settings-body">
            <div class="form-group">
                <label for="systemPrompt">Personalidad (System Prompt):</label>
                <textarea id="systemPrompt" rows="8"></textarea>
            </div>
            <div class="form-group">
                <label for="temperatureSlider">Temperatura creativa: <span id="tempValue">1.2</span></label>
                <input type="range" id="temperatureSlider" min="0.0" max="2.0" step="0.1" value="1.2">
            </div>
            <div class="warning-msg">
                <span>⚠️</span> Al aplicar la configuración se reiniciará la conversación.
            </div>
            <div class="settings-actions">
                <button id="applyConfigBtn" class="btn-primary">Aplicar configuración</button>
                <button id="resetConfigBtn" class="btn-secondary">Restablecer valores de Carmensita</button>
            </div>
        </div>
    </div>
    
    <!-- Dim overlay behind settings panel -->
    <div id="settingsOverlay" class="settings-overlay"></div>

    <div class="app-container">
        <!-- Left panel: Sprites Area (40%) -->
        <div class="sprite-area">
            <div class="carmensita-container">
                <!-- Manga-style Speech Bubble -->
                <div class="speech-bubble" id="speechBubble" style="display: none;">
                    <div class="bubble-content" id="bubbleText"></div>
                    <div class="bubble-pointer"></div>
                </div>

                <!-- Layered PNG system (ordered from back to front) -->
                <img id="layer-body-base" class="sprite-layer" src="{{ url_for('static', filename='sprites/body_base.png') }}" alt="Body Base" onerror="handleMissingSprite(this, 'body')">
                <img id="layer-body-talking" class="sprite-layer hidden" src="{{ url_for('static', filename='sprites/body_talking.png') }}" alt="Body Talking" onerror="handleMissingSprite(this, 'body')">
                <img id="layer-face" class="sprite-layer" src="{{ url_for('static', filename='sprites/face_neutral.png') }}" alt="Face" onerror="handleMissingSprite(this, 'face')">
                <img id="layer-eyes" class="sprite-layer hidden" src="{{ url_for('static', filename='sprites/eyes_blink.png') }}" alt="Eyes Blink" onerror="handleMissingSprite(this, 'face')">
            </div>
        </div>

        <!-- Right panel: Chat UI (60%) -->
        <div class="chat-panel">
            <div class="chat-history" id="chatHistory">
                <!-- Conversation bubbles will be appended here via JS -->
            </div>
            
            <div class="message-input-area">
                <textarea id="messageInput" placeholder="Type your message... (Shift+Enter for new line)"></textarea>
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Pass backend URL paths dynamically to Javascript -->
    <script>
        window.STATIC_SPRITES_URL = "{{ url_for('static', filename='sprites/') }}";
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
