<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carmensita AI - Premium Chat</title>
    <!-- Google Fonts: Outfit for a premium feel -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Premium Floating Actions -->
    <div class="top-actions">
        <button id="themeToggle" class="action-btn" title="Cambiar tema">🌙</button>
        <button id="settingsBtn" class="action-btn" title="Configuración">⚙️</button>
    </div>

    <!-- Frosted Sidebar configuration panel -->
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-header">
            <h2>Panel de Control</h2>
            <button id="closeSettingsBtn" class="close-btn" title="Cerrar">&times;</button>
        </div>
        <div class="settings-body">
            <div class="form-group">
                <label for="systemPrompt">Personalidad (System Prompt):</label>
                <textarea id="systemPrompt" rows="8" placeholder="Define cómo debe actuar Carmensita..."></textarea>
            </div>
            <div class="form-group">
                <label for="temperatureSlider">Temperatura creativa: <span id="tempValue">1.2</span></label>
                <input type="range" id="temperatureSlider" min="0.0" max="2.0" step="0.1" value="1.2">
            </div>
            <div class="warning-msg">
                <span>⚠️</span> El cambio de configuración reiniciará la sesión actual.
            </div>

            <!-- System Status Area -->
            <div class="system-status">
                <h3>Estado del Sistema</h3>
                <div class="status-box">
                    <div class="status-item">
                        <span class="label">Modelo:</span>
                        <span id="stat-model">Cargando...</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Mensajes enviados:</span>
                        <span id="stat-messages">0</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Salud:</span>
                        <div id="status-indicator" class="indicator-green" title="Conexión estable"></div>
                    </div>
                </div>
                <div id="status-error" class="error-status hidden"></div>
            </div>

            <div class="settings-actions">
                <button id="applyConfigBtn" class="btn-primary">Guardar Cambios</button>
                <button id="resetConfigBtn" class="btn-secondary">Restaurar Carmensita</button>
            </div>
        </div>
    </div>
    
    <div id="settingsOverlay" class="settings-overlay"></div>

    <main class="app-container">
        <!-- Sprite Display Section -->
        <section class="sprite-area">
            <div class="carmensita-container">
                <div class="speech-bubble" id="speechBubble" style="display: none;">
                    <div class="bubble-content" id="bubbleText"></div>
                    <div class="bubble-pointer"></div>
                </div>

                <img id="layer-body-base" class="sprite-layer" src="{{ url_for('static', filename='sprites/body_base.png') }}" alt="Body">
                <img id="layer-body-talking" class="sprite-layer hidden" src="{{ url_for('static', filename='sprites/body_talking.png') }}" alt="Talking">
                <img id="layer-body-talking-sad" class="sprite-layer hidden" src="{{ url_for('static', filename='sprites/Body_Talking_Sad.png') }}" alt="Talking Sad">
                <img id="layer-face" class="sprite-layer" src="{{ url_for('static', filename='sprites/face_neutral.png') }}" alt="Face">
                <img id="layer-eyes" class="sprite-layer hidden" src="{{ url_for('static', filename='sprites/eyes_blink.png') }}" alt="Eyes">
            </div>
        </section>

        <!-- Premium Chat Container -->
        <section class="chat-container">
            <header class="chat-header">
                <div class="ai-status">
                    <div class="status-indicator"></div>
                    <div class="ai-info">
                        <h1>María Carmen</h1>
                    </div>
                </div>
            </header>

            <div class="chat-history" id="chatHistory">
                <!-- Messages go here -->
            </div>
            
            <div class="message-input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Escribe un mensaje aquí..."></textarea>
                    <button id="sendBtn" title="Enviar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        window.STATIC_SPRITES_URL = "{{ url_for('static', filename='sprites/') }}";
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}?v=4"></script>
</body>
</html>
